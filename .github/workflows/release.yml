name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      # Documentation
      - '**.md'
      - 'docs/**'
      - '.github/pull_request_template.md'

      # License and legal
      - 'LICENSE'
      - 'AUTHORS'
      - 'NOTICE'

      # Git configuration
      - '.gitignore'
      - '.gitattributes'

      # Code quality configs (don't affect versioning)
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.prettierrc*'
      - '.prettierignore'
      - 'commitlint.config.*'
      - '.editorconfig'

      # Editor directories
      - '.vscode/**'
      - '.idea/**'

  workflow_dispatch:

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Wait for CI to succeed on this commit
        if: github.event_name != 'workflow_dispatch'
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          while :; do
            RUN=$(gh run list --repo "$REPO" --commit "$SHA" --workflow CI --limit 1 \
              --json status,conclusion --jq '.[0]')
            if [ -z "$RUN" ] || [ "$RUN" = "null" ]; then
              echo "No CI run registered yet for $SHA; waiting..."
              sleep 20
              continue
            fi
            STATUS=$(echo "$RUN" | jq -r .status)
            if [ "$STATUS" = "completed" ]; then
              break
            fi
            echo "CI status: $STATUS; waiting..."
            sleep 20
          done
          CONCLUSION=$(echo "$RUN" | jq -r .conclusion)
          echo "CI conclusion: $CONCLUSION"
          if [ "$CONCLUSION" != "success" ]; then
            echo "CI did not succeed on $SHA. Aborting release."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git credentials
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: npx semantic-release
