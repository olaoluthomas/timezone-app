<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timezone App - Current Time & Location</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a2e;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%);
            backdrop-filter: blur(8px);
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            width: 36px;
            height: 36px;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: white;
            font-size: 1.2em;
            font-weight: 600;
        }

        /* ── Globe hero ── */
        .globe-hero {
            flex: 1;
            min-height: 0;
            position: relative;
            background: #0a0a2e;
        }

        #globe-container {
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in;
        }

        #globe-container.ready {
            opacity: 1;
        }

        .globe-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 1em;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* ── Globe floating location label ── */
        .globe-label {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 8px;
            padding: 9px 13px;
            border-left: 3px solid #667eea;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
            /* Centre horizontally and sit above the pin */
            transform: translate(-50%, calc(-100% - 14px));
            white-space: nowrap;
            pointer-events: none;
        }

        /* Downward arrow connecting label to pin */
        .globe-label::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border: 8px solid transparent;
            border-bottom: none;
            border-top-color: rgba(255, 255, 255, 0.96);
        }

        .globe-label-city {
            font-size: 0.88em;
            font-weight: 700;
            color: #222;
            margin-bottom: 2px;
        }

        .globe-label-country {
            font-size: 0.72em;
            color: #666;
            margin-bottom: 3px;
        }

        .globe-label-time {
            font-size: 0.78em;
            font-weight: 600;
            color: #667eea;
        }

        /* ── Error banner ── */
        .error-banner {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 14px 20px;
            background: rgba(254, 238, 238, 0.95);
            color: #c33;
            text-align: center;
            font-size: 0.9em;
            backdrop-filter: blur(4px);
        }

        .error-banner--warning {
            background: rgba(255, 248, 225, 0.95);
            color: #92400e;
            border-top: 3px solid #f59e0b;
        }

        /* ── Info strip ── */
        .info-strip {
            background: white;
            padding: 16px 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            align-items: stretch;
            border-top: 3px solid #667eea;
            flex-shrink: 0;
        }

        .info-chip {
            background: #f7f7f7;
            border-left: 3px solid #667eea;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            flex: 1;
            /* Wide enough to avoid truncation on typical screens */
            min-width: 140px;
        }

        .chip-label {
            font-size: 0.72em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            white-space: nowrap;
        }

        .chip-value {
            font-size: 1em;
            font-weight: 600;
            color: #333;
            /* Allow natural line breaks; break-anywhere as a last resort for IPs */
            overflow-wrap: anywhere;
            line-height: 1.3;
        }

        /* ── Mobile (≤600px) ── */
        @media (max-width: 600px) {
            body {
                height: auto;
                overflow: auto;
            }

            .globe-hero {
                flex: none;
                height: 60vw;
                min-height: 240px;
            }

            h1 { font-size: 1em; }

            /* 2 columns × 2 rows for the 4 remaining chips */
            .info-strip {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                padding: 14px 16px;
                gap: 10px;
            }

            .info-chip {
                min-width: 0;
                padding: 10px 12px;
            }

            .chip-value { font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <img src="logo.svg" alt="Timezone App" class="logo">
        <h1>Timezone Detector</h1>
    </header>

    <div class="globe-hero">
        <div id="globe-container"></div>
        <div class="globe-loading" id="globe-loading">Detecting your location…</div>
        <div id="error-banner" class="error-banner" hidden></div>
    </div>

    <!--
        4 chips — location & time moved to the globe floating label.
        Remaining technical fields: Timezone, UTC Offset, Coordinates, IP Address.
    -->
    <div id="info-strip" class="info-strip" hidden>
        <div class="info-chip">
            <span class="chip-label">Timezone</span>
            <span class="chip-value" id="info-timezone">--</span>
        </div>
        <div class="info-chip">
            <span class="chip-label">UTC Offset</span>
            <span class="chip-value" id="info-utc">--</span>
        </div>
        <div class="info-chip">
            <span class="chip-label">Coordinates</span>
            <span class="chip-value" id="info-coords">--</span>
        </div>
        <div class="info-chip">
            <span class="chip-label">IP Address</span>
            <span class="chip-value" id="info-ip">--</span>
        </div>
    </div>

    <!--
        Globe.GL loaded synchronously before the inline script.
        CSP sources to whitelist when Helmet CSP is eventually enabled:
          script-src: cdn.jsdelivr.net
          img-src:    unpkg.com  (earth-day.jpg, night-sky.png)
    -->
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2/dist/globe.gl.min.js"></script>
    <script>
        let globeInstance = null;

        async function fetchTimezoneInfo() {
            let errorMessage = null;
            let isWarning = false;

            try {
                const response = await fetch('/api/timezone');
                if (!response.ok) {
                    if (response.status === 503) {
                        errorMessage = "Service temporarily unavailable — the geolocation provider's monthly limit has been reached. Please try again later.";
                        isWarning = true;
                    } else if (response.status === 429) {
                        errorMessage = "You're making requests too quickly. Please wait a few minutes and try again.";
                        isWarning = true;
                    } else if (response.status === 500) {
                        errorMessage = "Something went wrong while loading your timezone information. Please try again later.";
                    } else {
                        errorMessage = "Unable to load timezone information. Please try again later.";
                    }
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                displayTimezoneInfo(data);
                setInterval(() => updateCurrentTime(data.timezone), 1000);
            } catch (error) {
                const message = errorMessage
                    || 'Unable to reach the server. Please check your connection and try again.';
                showError(message, isWarning);
                initGlobe(null);
            }
        }

        function displayTimezoneInfo(data) {
            const latDir = data.latitude  >= 0 ? 'N' : 'S';
            const lngDir = data.longitude >= 0 ? 'E' : 'W';

            document.getElementById('info-timezone').textContent = data.timezone;
            document.getElementById('info-utc').textContent      = data.utcOffset;
            document.getElementById('info-coords').textContent   =
                `${Math.abs(data.latitude).toFixed(4)}°${latDir}, ${Math.abs(data.longitude).toFixed(4)}°${lngDir}`;
            document.getElementById('info-ip').textContent       = data.ip;

            document.getElementById('info-strip').removeAttribute('hidden');
            updateCurrentTime(data.timezone);
            initGlobe(data);
        }

        function showError(message, isWarning) {
            const banner = document.getElementById('error-banner');
            banner.textContent = `⚠️ ${message}`;
            banner.className   = `error-banner${isWarning ? ' error-banner--warning' : ''}`;
            banner.removeAttribute('hidden');
            document.getElementById('globe-loading')?.remove();
        }

        function initGlobe(data) {
            const lat = data ? data.latitude  : null;
            const lng = data ? data.longitude : null;

            // Re-use existing instance — pan to the new location
            if (globeInstance) {
                if (lat !== null) {
                    globeInstance.pointOfView({ lat, lng, altitude: 0.5 }, 1500);
                }
                return;
            }

            // Globe.GL CDN may be blocked by ad blockers or firewalls
            if (typeof Globe === 'undefined') {
                const container = document.getElementById('globe-container');
                container.style.cssText =
                    'opacity:1;display:flex;align-items:center;justify-content:center;' +
                    'color:rgba(255,255,255,0.4);font-size:0.9em;';
                container.textContent = 'Globe view unavailable';
                document.getElementById('globe-loading')?.remove();
                return;
            }

            // Defer init one frame so layout dimensions (flex: 1) are settled
            requestAnimationFrame(() => {
                const container = document.getElementById('globe-container');

                globeInstance = Globe()
                    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-day.jpg')
                    .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                    .onGlobeReady(() => {
                        container.classList.add('ready');
                        document.getElementById('globe-loading')?.remove();

                        // Keep the globe stationary on the user's location
                        globeInstance.controls().autoRotate = false;

                        if (lat !== null && lng !== null) {
                            // Snap to hemisphere, then animate zoom-in over 2 s
                            globeInstance.pointOfView({ lat, lng, altitude: 2.5 }, 0);
                            setTimeout(() => {
                                globeInstance.pointOfView({ lat, lng, altitude: 0.5 }, 2000);
                            }, 300);

                            addLocationMarker(data);
                        }
                    })
                    .width(container.clientWidth)
                    .height(container.clientHeight)(container);

                window.addEventListener('resize', () => {
                    if (globeInstance) {
                        const c = document.getElementById('globe-container');
                        globeInstance.width(c.clientWidth).height(c.clientHeight);
                    }
                });
            });
        }

        function addLocationMarker(data) {
            const { latitude: lat, longitude: lng, city, region, country } = data;

            // Pulsing ripple rings around the pin
            globeInstance
                .ringsData([{ lat, lng }])
                .ringColor(() => 'rgba(102, 126, 234, 0.75)')
                .ringMaxRadius(4)
                .ringPropagationSpeed(2)
                .ringRepeatPeriod(900);

            // Solid marker dot at the location
            globeInstance
                .pointsData([{ lat, lng }])
                .pointColor(() => '#667eea')
                .pointAltitude(0.015)
                .pointRadius(0.4);

            // Floating info label positioned above the pin
            const label = document.createElement('div');
            label.className = 'globe-label';
            label.innerHTML =
                `<div class="globe-label-city">${city}, ${region}</div>` +
                `<div class="globe-label-country">${country}</div>` +
                `<div class="globe-label-time" id="globe-time">--</div>`;

            globeInstance
                .htmlElementsData([{ lat, lng }])
                .htmlElement(() => label);
        }

        function updateCurrentTime(timezone) {
            const formatted = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                month:    'short',
                day:      'numeric',
                year:     'numeric',
                hour:     '2-digit',
                minute:   '2-digit',
                second:   '2-digit',
                hour12:   false,
            }).format(new Date());

            const infoTime  = document.getElementById('info-time');
            if (infoTime)  infoTime.textContent  = formatted;
            // Also update the time shown inside the globe floating label
            const globeTime = document.getElementById('globe-time');
            if (globeTime) globeTime.textContent = formatted;
        }

        fetchTimezoneInfo();
    </script>
</body>
</html>
